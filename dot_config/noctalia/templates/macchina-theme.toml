# macchina theme generated by Noctalia.
# Edit ~/.config/noctalia/templates/macchina-theme.toml instead.

spacing = 2
padding = 0
hide_ascii = false
prefer_small_ascii = false
separator = ">"
key_color = "{{colors.primary.default.hex}}"
separator_color = "{{colors.tertiary.default.hex}}"

[palette]
type = "Dark"
glyph = "● "
visible = true

[bar]
glyph = "■"
symbol_open = '['
symbol_close = ']'
hide_delimiters = true
visible = false

[box]
title = " Noctalia "
border = "rounded"
visible = false

[box.inner_margin]
x = 2
y = 0

[custom_ascii]
color = "{{colors.tertiary.default.hex}}"
path = "~/.config/noctalia/templates/macchina-owl.txt"

[randomize]
key_color = false
separator_color = false

[keys]
distro = "OS"
kernel = "Kernel"
wm = "WM"
terminal = "Term"
shell = "Shell"
uptime = "Uptime"
packages = "Pkgs"
resolution = "Res"
cpu = "CPU"
gpu = "GPU"
memory = "Memory"
disk_space = "Disk"

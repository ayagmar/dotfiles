# macchina config generated by Noctalia.
# Edit ~/.config/noctalia/templates/macchina-config.toml instead.

theme = "Noctalia"

current_shell = false
physical_cores = true
long_uptime = true
long_shell = false
long_kernel = false
memory_percentage = true
disk_space_percentage = true

disks = ["/"]

show = [
  "Distribution",
  "Kernel",
  "WindowManager",
  "Terminal",
  "Shell",
  "Uptime",
  "Packages",
  "Resolution",
  "Processor",
  "GPU",
  "Memory",
  "DiskSpace",
]
